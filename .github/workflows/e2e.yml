name: E2E

# Full end-to-end run: builds the real binary, starts a low+high pair wired
# over the HTTP diode transport, collects every stream from its real
# upstream (PyPI, proxy.golang.org, Maven Central, npmjs, cli.github.com,
# Docker Hub, huggingface.co, conda.anaconda.org, rubygems.org,
# repo.packagist.org, open-vsx.org, galaxy.ansible.com, cloud.r-project.org,
# github.com), and validates with the real client tools (pip, go, mvn+java,
# npm+node, apt-get+dpkg-deb, dnf+rpm, docker, huggingface_hub, curl,
# micromamba, bundler, composer+php, ansible-galaxy, Rscript, git). See
# e2e/doc.go.

on:
  push:
    branches: [ "main", "claude/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    # Pinned rather than ubuntu-latest: the suite leans on image-provided
    # toolchains (python, node, maven, docker) and apt-installed dnf, whose
    # behavior shifts between images — bump deliberately.
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install client tools (dnf, rpm, huggingface_hub CLI, terraform, R, ansible, micromamba)
        run: |
          sudo apt-get update
          # ruby-bundler: the runner image ships ruby but no bundler binary.
          sudo apt-get install -y --no-install-recommends dnf rpm r-base-core ruby-bundler
          if command -v pipx >/dev/null 2>&1; then
            pipx install huggingface_hub
            pipx install ansible-core
          else
            python3 -m pip install --user --break-system-packages huggingface_hub ansible-core
          fi
          # The ubuntu-24.04 image dropped the HashiCorp tools; install a
          # pinned terraform when neither it nor tofu is present.
          if ! command -v terraform >/dev/null 2>&1 && ! command -v tofu >/dev/null 2>&1; then
            curl -fsSL -o /tmp/terraform.zip \
              "https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip"
            sudo unzip -o /tmp/terraform.zip -d /usr/local/bin terraform
          fi
          # micromamba: single static binary, the lightest real conda client.
          curl -fsSL "https://micro.mamba.pm/api/micromamba/linux-64/latest" \
            | sudo tar -xj -C /usr/local bin/micromamba

      - name: Preflight tool and upstream checks
        run: |
          set -x
          go version
          python3 --version
          node --version && npm --version
          mvn --version | head -1
          java -version 2>&1 | head -1
          docker info --format 'docker {{.ServerVersion}}'
          dnf --version | head -1
          rpm --version
          curl --version | head -1
          hf version || huggingface-cli version
          cargo --version
          (terraform -version || tofu -version) | head -1
          helm version --short
          dotnet --version
          ruby --version && bundle --version
          php --version | head -1 && composer --version
          ansible-galaxy --version | head -1
          Rscript --version
          micromamba --version
          git --version
          # Fail fast if the suite's default GGUF reference has rotted
          # upstream (keep in sync with defaultGGUF in e2e/hf_test.go).
          curl -fsSI -o /dev/null "https://huggingface.co/v2/bartowski/SmolLM2-135M-Instruct-GGUF/manifests/Q4_K_M"
          # ...and that the new streams' upstreams answer at all (keep in
          # sync with the pins in e2e/{crates,terraform,helm,nuget,apk}_test.go).
          curl -fsS -o /dev/null "https://index.crates.io/config.json"
          curl -fsS -o /dev/null "https://registry.terraform.io/.well-known/terraform.json"
          curl -fsSI -o /dev/null "https://charts.jetstack.io/index.yaml"
          curl -fsS -o /dev/null "https://api.nuget.org/v3/index.json"
          curl -fsSI -o /dev/null "https://dl-cdn.alpinelinux.org/alpine/v3.20/main/x86_64/APKINDEX.tar.gz"
          # ...and the second wave's upstreams (keep in sync with the pins in
          # e2e/{conda,rubygems,composer,vsx,galaxy,cran,git}_test.go).
          curl -fsSI -o /dev/null "https://conda.anaconda.org/conda-forge/noarch/repodata.json"
          curl -fsSL -o /dev/null "https://rubygems.org/info/rake"
          curl -fsS -o /dev/null "https://repo.packagist.org/p2/psr/container.json"
          curl -fsS -o /dev/null "https://open-vsx.org/api/usernamehw/errorlens"
          curl -fsSL -o /dev/null "https://galaxy.ansible.com/api/"
          curl -fsSI -o /dev/null "https://cloud.r-project.org/src/contrib/PACKAGES.gz"
          curl -fsS -o /dev/null "https://github.com/octocat/Hello-World.git/info/refs?service=git-upload-pack"

      - name: Run end-to-end suite
        env:
          ARTIGATE_E2E_REQUIRE_ALL: "1"
          ARTIGATE_E2E_WORKDIR: ${{ runner.temp }}/artigate-e2e
          # Optional: a Hugging Face access token (read scope) authenticates
          # the HF collects. Anonymous LFS downloads from shared runner IPs
          # get intermittently rate-limited (HTTP 403 on public models),
          # which flakes TestHFRepo/TestHFGGUF; the harness passes this
          # through to the low server, and an unset secret keeps today's
          # anonymous behavior.
          ARTIGATE_HF_TOKEN: ${{ secrets.ARTIGATE_HF_TOKEN }}
        run: go test -tags e2e -v -count=1 -timeout 25m ./e2e

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-logs
          path: ${{ runner.temp }}/artigate-e2e/*.log
          if-no-files-found: ignore
