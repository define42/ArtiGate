name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 4 * * 1"  # every Monday at 04:00 UTC

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # ArtiGate has no third-party dependencies, so there is no go.sum to
          # key a module cache on.
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          # Excludes three query families that flag ArtiGate's inherent
          # behaviour (mirroring fetches, package-manager exec, paths from
          # verified indexes / validated operator input). See the file for the
          # per-rule justification.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
