name: Go

on:
  push:
    branches: [ "main" ]
    tags-ignore:
      - "v*"          # prevent infinite loops when pushing tags
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build & test
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secure Compose defaults
        shell: bash
        run: |
          if env -u ARTIGATE_LOW_AUTH -u ARTIGATE_DIODE_TOKEN docker compose config >/dev/null 2>&1; then
            echo "docker compose config unexpectedly accepted missing credentials" >&2
            exit 1
          fi
          export ARTIGATE_LOW_AUTH='ci:$argon2id$v=19$m=8,t=1,p=1$c2FsdA$aGFzaA'
          export ARTIGATE_DIODE_TOKEN='0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
          docker compose config --format json > compose-rendered.json
          python3 - <<'PY'
          import json

          with open("compose-rendered.json", encoding="utf-8") as f:
              config = json.load(f)
          services = config["services"]
          assert services["low"]["ports"][0]["host_ip"] == "127.0.0.1"
          assert services["high"]["ports"][0]["host_ip"] == "127.0.0.1"
          assert services["low"]["environment"]["ARTIGATE_LOW_AUTH"]
          assert services["low"]["environment"]["ARTIGATE_DIODE_TOKEN"]
          assert services["high"]["environment"]["ARTIGATE_DIODE_TOKEN"]
          low_sources = {v["source"] for v in services["low"]["volumes"]}
          high_sources = {v["source"] for v in services["high"]["volumes"]}
          assert "keys" in low_sources
          assert "keys" not in high_sources
          assert "high-keys" in high_sources
          PY

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # No third-party dependencies, hence no go.sum to cache on.
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests with coverage
        run: gotestsum --junitfile junit.xml -- ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Show coverage in job summary
        if: ${{ !cancelled() }}
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          {
            echo "## Go Test Coverage"
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml

  # ---------------------------------------------------------------------------
  # Lint (uses the repository's .golangci.yml)
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  # ---------------------------------------------------------------------------
  # Versioning, release & container publish (push to main only)
  # ---------------------------------------------------------------------------
  release:
    needs: [test, lint]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # required for tags + GitHub releases
      packages: write   # required for GHCR push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # REQUIRED for tag calculation

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main

      - name: Create GitHub release
        if: steps.tag.outputs.new_tag != ''
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: imgtags
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          tags="${repo}:latest,${repo}:${GITHUB_SHA}"
          if [ -n "${{ steps.tag.outputs.new_tag }}" ]; then
            tags="${tags},${repo}:${{ steps.tag.outputs.new_tag }}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.imgtags.outputs.tags }}
