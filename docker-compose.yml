# ArtiGate local stack: a low side and a high side wired together.
#
# SECURITY: this file deliberately has no reusable credentials and refuses to
# render until ARTIGATE_LOW_AUTH and ARTIGATE_DIODE_TOKEN are set (normally in
# a gitignored .env copied from .env.example). Published ports bind to loopback
# unless explicitly overridden. Plain HTTP is suitable only on that local
# boundary; put a TLS-authenticating reverse proxy in front before overriding
# either bind address for remote access.
#
# In a real deployment the two sides are physically separated by a one-way data
# diode. Here the HTTP diode transport stands in for that transfer: the low
# side uploads every exported bundle to the high side's ingest endpoint
# (ARTIGATE_DIODE_URL -> PUT http://high:8080/diode/<file>), where the normal
# verify-and-import pipeline picks it up. The transport carries no trust — the
# high side still verifies the Ed25519 signature, sequencing, and every hash.
#
# Prefer the classic folder flow instead? Drop the ARTIGATE_DIODE_* variables
# and mount one shared volume as the low side's /var/spool/diode-out and the
# high side's /var/spool/diode-in.
#
# Driving a real one-way fiber with the built-in UDP diode (pitcher/catcher)
# instead? See examples/docker-compose-diode-low.yml and
# examples/docker-compose-diode-high.yml — those run one side per host with
# network_mode: host and CAP_NET_ADMIN.
#
# The `keygen` service creates the Ed25519 signing key pair once into separate
# private/public volumes. The low side can read only the private-key `keys`
# volume and the high side only the `high-keys` public-key volume. On upgrade,
# keygen copies a legacy public key out of `keys` without rotating the pair.
#
# UIs after configuring .env and running `make run`:
#   Low side  (exporter dashboard): http://localhost:8080/
#   High side (repository + tree):  http://localhost:8081/
# Sign in to the low-side dashboard with the password whose hash you configured;
# unauthenticated requests cannot reach its signing and collection endpoints.

services:
  keygen:
    build: .
    entrypoint: ["sh", "-c"]
    command:
      - 'if test -f /low-keys/low.ed25519; then if test -f /high-keys/high.ed25519.pub; then exit 0; elif test -f /low-keys/high.ed25519.pub; then cp /low-keys/high.ed25519.pub /high-keys/high.ed25519.pub; else echo "private key exists but public key is missing; restore it instead of rotating trust" >&2; exit 1; fi; elif test -f /high-keys/high.ed25519.pub; then echo "public key exists but private key is missing; restore it instead of rotating trust" >&2; exit 1; else artigate keygen --private /low-keys/low.ed25519 --public /high-keys/high.ed25519.pub; fi'
    volumes:
      - keys:/low-keys
      - high-keys:/high-keys

  low:
    build: .
    depends_on:
      keygen:
        condition: service_completed_successfully
      high:
        condition: service_started
    command:
      - low
      - --listen=:8080
      - --root=/var/lib/artigate
      - --export-dir=/var/spool/diode-out
      - --private-key=/keys/low.ed25519
      - --upstream-goproxy=https://proxy.golang.org,direct
    environment:
      # Upload every exported bundle to the high side's ingest endpoint. The
      # export dir stays the retry spool: a failed upload leaves the bundle
      # staged there for a re-transmit from the Status page.
      ARTIGATE_DIODE_URL: http://high:8080/diode
      ARTIGATE_DIODE_TOKEN: "${ARTIGATE_DIODE_TOKEN:?Set ARTIGATE_DIODE_TOKEN in .env; use a random value such as openssl rand -hex 32}"
      # The low side holds the signing key, so its entire UI/API is a privileged
      # control plane. Compose requires an operator-generated argon2id credential
      # rather than ever starting it unauthenticated.
      ARTIGATE_LOW_AUTH: "${ARTIGATE_LOW_AUTH:?Set ARTIGATE_LOW_AUTH in .env; generate it with ./artigate hashpw --user admin}"
      # Optional standing logins for private container registries
      # (host=user:password, comma-separated); scheduled pulls rely on this.
      ARTIGATE_CONTAINER_AUTH: "${ARTIGATE_CONTAINER_AUTH:-}"
    ports:
      - "${ARTIGATE_LOW_BIND:-127.0.0.1}:8080:8080"
    volumes:
      - keys:/keys:ro
      - low-outbound:/var/spool/diode-out
      - low-data:/var/lib/artigate
    restart: unless-stopped

  high:
    build: .
    depends_on:
      keygen:
        condition: service_completed_successfully
    command:
      - high
      - --listen=:8080
      - --root=/var/lib/artigate
      - --landing=/var/spool/diode-in
      - --public-key=/keys/high.ed25519.pub
      - --import-interval=10s
    environment:
      # Accept bundle uploads at PUT/POST /diode/<file> into the landing dir.
      # The token must match the low side's; it only guards the disk — bundle
      # trust still comes from the Ed25519 signature check on import.
      ARTIGATE_DIODE_INGEST: "on"
      ARTIGATE_DIODE_TOKEN: "${ARTIGATE_DIODE_TOKEN:?Set ARTIGATE_DIODE_TOKEN in .env; use a random value such as openssl rand -hex 32}"
      # The high side restricts its state-changing admin endpoints
      # (POST /admin/uploads/delete, /admin/import) to loopback callers by
      # default. Under Docker's published-port NAT the container sees the
      # gateway address, not loopback, so the dashboard's delete/import would be
      # refused. Access is instead restricted at the host by the loopback
      # publish below (ARTIGATE_HIGH_BIND defaults to 127.0.0.1), so it is safe
      # to allow the in-container admin calls here. If you widen ARTIGATE_HIGH_BIND
      # to a non-loopback address, put an authenticating TLS proxy in front.
      ARTIGATE_HIGH_ALLOW_REMOTE_ADMIN: "on"
    ports:
      - "${ARTIGATE_HIGH_BIND:-127.0.0.1}:8081:8080"
    volumes:
      - high-keys:/keys:ro
      - high-landing:/var/spool/diode-in
      - high-data:/var/lib/artigate
    restart: unless-stopped

volumes:
  keys:
  high-keys:
  low-outbound:
  high-landing:
  low-data:
  high-data:
