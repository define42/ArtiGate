# ArtiGate demo stack: a low side and a high side wired together.
#
# In a real deployment the two sides are physically separated by a one-way data
# diode. Here the HTTP diode transport stands in for that transfer: the low
# side uploads every exported bundle to the high side's ingest endpoint
# (ARTIGATE_DIODE_URL -> PUT http://high:8080/diode/<file>), where the normal
# verify-and-import pipeline picks it up. The transport carries no trust — the
# high side still verifies the Ed25519 signature, sequencing, and every hash.
#
# Prefer the classic folder flow instead? Drop the ARTIGATE_DIODE_* variables
# and mount one shared volume as the low side's /var/spool/diode-out and the
# high side's /var/spool/diode-in.
#
# The `keygen` service creates the Ed25519 signing key pair once into the shared
# `keys` volume (idempotent: it will not overwrite existing keys), then low and
# high start after it completes.
#
# UIs after `make run`:
#   Low side  (exporter dashboard): http://localhost:8080/
#   High side (repository + tree):  http://localhost:8081/
#
# Try it:
#   # Mirror a Go module (+ its dependency graph) on the low side:
#   curl -XPOST localhost:8080/admin/go/collect \
#     -d '{"modules":["rsc.io/quote@latest"],"resolve_deps":true}'
#   # Mirror Python wheels:
#   curl -XPOST localhost:8080/admin/python/collect \
#     -d '{"requirements":["requests"]}'
#   # Then watch them appear on the high side dashboard at :8081.

services:
  keygen:
    build: .
    entrypoint: ["sh", "-c"]
    command:
      - 'test -f /keys/low.ed25519 || artigate keygen --private /keys/low.ed25519 --public /keys/high.ed25519.pub'
    volumes:
      - keys:/keys

  low:
    build: .
    depends_on:
      keygen:
        condition: service_completed_successfully
      high:
        condition: service_started
    command:
      - low
      - --listen=:8080
      - --root=/var/lib/artigate
      - --export-dir=/var/spool/diode-out
      - --private-key=/keys/low.ed25519
      - --upstream-goproxy=https://proxy.golang.org,direct
    environment:
      # Upload every exported bundle to the high side's ingest endpoint. The
      # export dir stays the retry spool: a failed upload leaves the bundle
      # staged there for a re-transmit from the Status page.
      - ARTIGATE_DIODE_URL=http://high:8080/diode
      - ARTIGATE_DIODE_TOKEN=change-me-diode-token
      # Optional low-side login. DISABLED by default — uncomment the line below
      # and replace the hash with your own, generated with:
      #   ./artigate hashpw --user user
      # NOTE: Compose treats a single "$" as a variable reference, so every "$"
      # in the argon2 hash MUST be doubled to "$$" here (it reaches the container
      # as a single "$"). The example hash below is the password "password" — do
      # NOT ship it; generate your own.
      # - ARTIGATE_LOW_AUTH=user:$$argon2id$$v=19$$m=65536,t=3,p=1$$5ba6Q+p3TKhi2kXkU+OtIw$$lg4sRrA78xnKtlOiNCMOAPtaHAG0KoTNzUV8xStZSes
    ports:
      - "8080:8080"
    volumes:
      - keys:/keys:ro
      - low-outbound:/var/spool/diode-out
      - low-data:/var/lib/artigate
    restart: unless-stopped

  high:
    build: .
    depends_on:
      keygen:
        condition: service_completed_successfully
    command:
      - high
      - --listen=:8080
      - --root=/var/lib/artigate
      - --landing=/var/spool/diode-in
      - --public-key=/keys/high.ed25519.pub
      - --import-interval=10s
    environment:
      # Accept bundle uploads at PUT/POST /diode/<file> into the landing dir.
      # The token must match the low side's; it only guards the disk — bundle
      # trust still comes from the Ed25519 signature check on import.
      - ARTIGATE_DIODE_INGEST=on
      - ARTIGATE_DIODE_TOKEN=change-me-diode-token
    ports:
      - "8081:8080"
    volumes:
      - keys:/keys:ro
      - high-landing:/var/spool/diode-in
      - high-data:/var/lib/artigate
    restart: unless-stopped

volumes:
  keys:
  low-outbound:
  high-landing:
  low-data:
  high-data:
