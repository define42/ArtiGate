<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ArtiGate</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; margin: 0; background: #0f1115; color: #e6e6e6; }
  header { padding: 1rem 1.5rem; background: #161a22; border-bottom: 1px solid #2a2f3a; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  header h1 { font-size: 1.25rem; margin: 0; }
  nav { display: flex; gap: .4rem; }
  nav button { background: #2a2f3a; color: #c7cedb; border: 1px solid #3a4150; border-radius: 6px; padding: .4rem .9rem; cursor: pointer; font: inherit; }
  nav button.active { background: #1f6f43; color: #eafff2; border-color: #2b8f59; }
  header .refresh { margin-left: auto; background: #2a2f3a; color: #e6e6e6; border: 1px solid #3a4150; border-radius: 6px; padding: .4rem .8rem; cursor: pointer; }
  main { padding: 1.5rem; }
  .banner { padding: .9rem 1.1rem; border-radius: 8px; margin-bottom: 1.5rem; font-weight: 600; }
  .banner.ok { background: #10281a; border: 1px solid #1f6f43; color: #7ee2a8; }
  .banner.warn { background: #2e1416; border: 1px solid #7f2a30; color: #ff9ea3; }
  .meta { margin-bottom: 1.75rem; overflow-x: auto; }
  .streams { border-collapse: collapse; font-size: .85rem; color: #a9b2c3; }
  .streams th, .streams td { text-align: left; padding: .35rem 1.1rem .35rem 0; border-bottom: 1px solid #232833; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .streams th { color: #8b93a5; font-weight: 600; }
  .streams td.s-name { color: #e6e6e6; font-weight: 600; }
  .pill { display: inline-block; border-radius: 999px; padding: .05rem .55rem; font-size: .75rem; font-weight: 600; }
  .pill.ok { background: #10281a; border: 1px solid #1f6f43; color: #7ee2a8; }
  .pill.warn { background: #2e1416; border: 1px solid #7f2a30; color: #ff9ea3; }
  section h2 { font-size: 1rem; border-bottom: 1px solid #2a2f3a; padding-bottom: .4rem; }
  .tree-head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; border-bottom: 1px solid #2a2f3a; margin-bottom: .5rem; }
  .tree-head h2 { border-bottom: none; margin: 0; padding-bottom: .4rem; }
  .layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 1.5rem; align-items: start; }
  .layout[hidden] { display: none; }
  @media (max-width: 760px) { .layout { grid-template-columns: 1fr; } }
  details { border-left: 1px solid #2a2f3a; margin: .1rem 0; padding: 0 0 0 .1rem; }
  #tree > details { border: 1px solid #2a2f3a; border-radius: 6px; background: #161a22; margin: .35rem 0; padding: .1rem .6rem; }
  summary { cursor: pointer; padding: .35rem .1rem; font-weight: 600; list-style-position: inside; }
  summary .count { color: #8b93a5; font-weight: 400; font-size: .85rem; margin-left: .4rem; }
  .children { margin-left: 1rem; }
  .leaf { padding: .18rem .4rem .18rem 1.2rem; font-family: ui-monospace, monospace; font-size: .85rem; color: #c7cedb; cursor: pointer; border-radius: 4px; }
  .leaf:hover { background: #1c2230; }
  .leaf.selected { background: #1f6f43; color: #eafff2; }
  .empty { color: #8b93a5; font-style: italic; padding: .2rem 0 .2rem 1.2rem; margin: 0; }
  .detail-col { position: sticky; top: 1rem; display: flex; flex-direction: column; gap: 1rem; }
  .detail { background: #161a22; border: 1px solid #2a2f3a; border-radius: 8px; padding: 1rem 1.1rem; }
  .layers h3 { margin: 0 0 .1rem; font-size: 1rem; }
  .layers .layers-sub { color: #8b93a5; font-size: .78rem; margin: 0 0 .7rem; }
  .layer-list { list-style: none; margin: 0; padding: 0; counter-reset: layer; }
  .layer-list li { border-top: 1px solid #232833; padding: .5rem 0 .55rem 1.7rem; position: relative; }
  .layer-list li:first-child { border-top: none; }
  .layer-list li::before { counter-increment: layer; content: counter(layer); position: absolute; left: 0; top: .5rem; color: #8b93a5; font-size: .72rem; font-variant-numeric: tabular-nums; }
  .layer-list li.meta::before { color: #56607a; }
  .layer-cmd { display: block; font-family: ui-monospace, monospace; font-size: .8rem; color: #c7cedb; white-space: pre-wrap; word-break: break-word; }
  .layer-list li.meta .layer-cmd { color: #8b93a5; }
  .layer-meta { color: #8b93a5; font-size: .74rem; margin-top: .22rem; font-variant-numeric: tabular-nums; }
  .layer-meta .sz { color: #7ee2a8; }
  .detail h3 { margin: 0; font-size: 1rem; font-family: ui-monospace, monospace; word-break: break-all; }
  .detail .subtitle { color: #8b93a5; font-size: .85rem; margin: .1rem 0 .8rem; }
  .detail dl { display: grid; grid-template-columns: auto 1fr; gap: .35rem .8rem; margin: 0; font-size: .85rem; }
  .detail dt { color: #8b93a5; }
  .detail dd { margin: 0; word-break: break-all; }
  .detail dd.mono { font-family: ui-monospace, monospace; }
  .detail .copy-ref { display: flex; align-items: center; justify-content: space-between; gap: .6rem; width: 100%; margin: .1rem 0 .9rem; padding: .45rem .6rem; background: #0f1115; border: 1px solid #2b8f59; border-radius: 6px; cursor: pointer; text-align: left; font: inherit; }
  .detail .copy-ref:hover { background: #12211a; }
  .detail .copy-ref:focus-visible { outline: 2px solid #2b8f59; outline-offset: 2px; }
  .copy-ref-text { font-family: ui-monospace, monospace; font-size: .82rem; color: #7ee2a8; word-break: break-all; }
  .copy-ref-tag { flex: none; background: #1f6f43; color: #eafff2; border: 1px solid #2b8f59; border-radius: 5px; padding: .12rem .5rem; font-size: .72rem; font-family: system-ui, sans-serif; }
  .detail pre { background: #0f1115; border: 1px solid #2a2f3a; border-radius: 6px; padding: .6rem .7rem; overflow: auto; font-size: .8rem; max-height: 340px; }
  .guide-toggle { background: #1f6f43; color: #eafff2; border: 1px solid #2b8f59; border-radius: 6px; padding: .4rem .9rem; cursor: pointer; font: inherit; }
  .repo-guide { margin-left: .6rem; padding: .1rem .5rem; font-size: .72rem; font-weight: 400; vertical-align: middle; }
  .guide-modal { padding: 0; border: 1px solid #2a2f3a; border-radius: 10px; background: #161a22; color: #e6e6e6; width: min(880px, calc(100% - 3rem)); max-height: calc(100dvh - 4rem); overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,.55); }
  .guide-modal::backdrop { background: rgba(6,8,12,.62); }
  .guide-inner { padding: 1.15rem 1.35rem 1.4rem; max-height: calc(100dvh - 4rem); overflow-y: auto; }
  .guide-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: .1rem; }
  .guide-head h2 { margin: 0; font-size: 1.1rem; }
  .guide-close { flex: none; background: #2a2f3a; color: #c7cedb; border: 1px solid #3a4150; border-radius: 6px; width: 1.9rem; height: 1.9rem; font-size: 1.15rem; line-height: 1; cursor: pointer; }
  .guide-close:hover { background: #333a48; }
  .guide-close:focus-visible { outline: 2px solid #2b8f59; outline-offset: 2px; }
  .guide-intro { color: #a9b2c3; font-size: .88rem; margin: .2rem 0 1rem; }
  .guide-intro code { font-family: ui-monospace, monospace; color: #e6e6e6; background: #0f1115; border: 1px solid #2a2f3a; border-radius: 4px; padding: .05rem .3rem; }
  @media (prefers-reduced-motion: no-preference) {
    .guide-modal[open] { animation: guidePop .16s ease-out; }
    .guide-modal[open]::backdrop { animation: guideFade .16s ease-out; }
  }
  @keyframes guidePop { from { opacity: 0; transform: translateY(8px) scale(.985); } }
  @keyframes guideFade { from { opacity: 0; } }
  .guide-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.75rem; align-items: start; }
  @media (max-width: 760px) { .guide-cols { grid-template-columns: 1fr; } }
  .guide-section h3 { font-size: .95rem; margin: 0 0 .35rem; }
  .guide-section > p { color: #a9b2c3; font-size: .84rem; margin: .15rem 0 .7rem; }
  .guide-section .note { color: #d8b26a; font-size: .8rem; margin: .6rem 0 0; border-left: 2px solid #6b5320; padding-left: .6rem; }
  .code { margin: .55rem 0; }
  .code-label { color: #8b93a5; font-size: .74rem; margin-bottom: .22rem; }
  .code pre { position: relative; background: #0f1115; border: 1px solid #2a2f3a; border-radius: 6px; padding: .6rem 4.4rem .6rem .7rem; overflow-x: auto; margin: 0; }
  .code code { font-family: ui-monospace, monospace; white-space: pre; font-size: .8rem; color: #c7cedb; }
  .copy { position: absolute; top: .4rem; right: .4rem; background: #2a2f3a; color: #c7cedb; border: 1px solid #3a4150; border-radius: 5px; padding: .22rem .55rem; font-size: .72rem; cursor: pointer; font-family: system-ui, sans-serif; }
  .copy:hover { background: #333a48; }
</style>
<script type="module" src="/ui/app.js"></script>
</head>
<body>
<header>
  <h1>ArtiGate <span style="color:#8b93a5;font-weight:400">high-side repository</span></h1>
  <nav>
    <button type="button" data-view="overview" class="active">Overview</button>
    <button type="button" data-view="go">Go</button>
    <button type="button" data-view="python">Python</button>
    <button type="button" data-view="maven">Maven</button>
    <button type="button" data-view="npm">NPM</button>
    <button type="button" data-view="apt">APT</button>
    <button type="button" data-view="rpm">RPM</button>
    <button type="button" data-view="containers">Containers</button>
  </nav>
  <button type="button" class="refresh" id="refresh">Refresh</button>
</header>
<main>
  <section id="view-overview">
    <h2>Import status</h2>
    <div id="banner" class="banner">Loading&hellip;</div>
    <div id="meta" class="meta"></div>
  </section>
  <div class="layout" id="view-tree" hidden>
    <section>
      <div class="tree-head">
        <h2 id="treeTitle"></h2>
        <button type="button" class="guide-toggle" id="guideBtn" aria-haspopup="dialog" aria-controls="guide">Set me up</button>
      </div>
      <div id="tree"></div>
    </section>
    <aside class="detail-col">
      <div id="detail" class="detail">
        <p class="empty">Select a version to see its details.</p>
      </div>
      <div id="layers" class="detail layers" hidden></div>
    </aside>
  </div>
  <dialog id="guide" class="guide-modal" aria-label="How to use this mirror from your clients">
    <div class="guide-inner">
      <div class="guide-head">
        <h2 id="guideTitle">Use this mirror from your clients</h2>
        <button type="button" class="guide-close" id="guideClose" aria-label="Close">&times;</button>
      </div>
      <div id="guideBody"></div>
    </div>
  </dialog>
</main>
</body>
</html>
